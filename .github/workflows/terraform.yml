name: 'OpenTofu CI/CD'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # Job 1: Validación y formateo (sin backend, sin credenciales AWS)
  validate:
    name: 'Validate and Format'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init (sin backend)
        run: tofu init -backend=false

      - name: Terraform Validate
        run: tofu validate

  # Job 2: Plan (en pull requests)
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Ensure Terraform State Bucket Exists
        run: |
          BUCKET="ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Terraform Init
        run: |
          tofu init \
            -backend-config="bucket=ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate" \
            -backend-config="key=ticket-classifier/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        id: plan
        run: tofu plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # Job 3: Apply (solo en main)
  apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://console.aws.amazon.com/states/home

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Ensure Terraform State Bucket Exists
        run: |
          BUCKET="ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Terraform Init
        run: |
          tofu init \
            -backend-config="bucket=ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate" \
            -backend-config="key=ticket-classifier/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Cleanup Orphaned Resources (if no state)
        run: |
          STATE_KEY="ticket-classifier/terraform.tfstate"
          STATE_BUCKET="ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate"
          NAME="ticket-classifier-${{ secrets.STUDENT_ID }}"

          # Solo limpiar si el archivo de estado no existe o está vacío
          STATE_SIZE=$(aws s3api head-object --bucket "$STATE_BUCKET" --key "$STATE_KEY" \
            --query ContentLength --output text 2>/dev/null || echo "0")

          if [ "$STATE_SIZE" = "0" ] || [ "$STATE_SIZE" = "None" ] || [ -z "$STATE_SIZE" ]; then
            echo "No state file found — cleaning up any orphaned AWS resources..."

            # Lambda functions
            for fn in validate-ticket classify-ticket route-ticket; do
              aws lambda delete-function --function-name ${NAME}-${fn} 2>/dev/null \
                && echo "Deleted Lambda: ${NAME}-${fn}" || true
            done

            # Step Function state machine
            SFN_ARN=$(aws stepfunctions list-state-machines \
              --query "stateMachines[?name=='${NAME}-ticket-classifier'].stateMachineArn" \
              --output text 2>/dev/null)
            if [ -n "$SFN_ARN" ] && [ "$SFN_ARN" != "None" ]; then
              aws stepfunctions delete-state-machine --state-machine-arn "$SFN_ARN" \
                && echo "Deleted Step Function: $SFN_ARN" || true
              sleep 5
            fi

            # Lambda IAM role: desadjuntar políticas y eliminar
            aws iam detach-role-policy --role-name ${NAME}-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true
            S3_POLICY_ARN=$(aws iam list-policies --scope Local \
              --query "Policies[?PolicyName=='${NAME}-s3-access'].Arn" --output text 2>/dev/null)
            if [ -n "$S3_POLICY_ARN" ] && [ "$S3_POLICY_ARN" != "None" ]; then
              aws iam detach-role-policy --role-name ${NAME}-lambda-role \
                --policy-arn "$S3_POLICY_ARN" 2>/dev/null || true
              aws iam delete-policy --policy-arn "$S3_POLICY_ARN" 2>/dev/null || true
            fi
            aws iam delete-role --role-name ${NAME}-lambda-role 2>/dev/null \
              && echo "Deleted IAM role: ${NAME}-lambda-role" || true

            # Step Function IAM role: eliminar políticas inline y el rol
            aws iam delete-role-policy --role-name ${NAME}-step-function-role \
              --policy-name "${NAME}-lambda-invoke" 2>/dev/null || true
            aws iam delete-role-policy --role-name ${NAME}-step-function-role \
              --policy-name "${NAME}-logs" 2>/dev/null || true
            aws iam delete-role --role-name ${NAME}-step-function-role 2>/dev/null \
              && echo "Deleted IAM role: ${NAME}-step-function-role" || true

            # CloudWatch Log Group
            aws logs delete-log-group \
              --log-group-name /aws/stepfunctions/${NAME}-ticket-classifier 2>/dev/null \
              && echo "Deleted Log Group" || true

            # S3 bucket de tickets (vaciar primero)
            aws s3 rm s3://${NAME}-tickets --recursive 2>/dev/null || true
            aws s3 rb s3://${NAME}-tickets --force 2>/dev/null \
              && echo "Deleted S3 bucket: ${NAME}-tickets" || true

            echo "Cleanup complete."
          else
            echo "State file exists (${STATE_SIZE} bytes) — skipping cleanup."
          fi

      - name: Terraform Apply
        run: tofu apply -auto-approve

      - name: Get Outputs
        id: outputs
        run: |
          echo "bucket_name=$(tofu output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "step_function_arn=$(tofu output -raw step_function_arn)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Deployment Successful!

          ### Resources Created/Updated:
          - **S3 Bucket**: \`${{ steps.outputs.outputs.bucket_name }}\`
          - **Step Function**: \`${{ steps.outputs.outputs.step_function_arn }}\`

          ### Next Steps:
          1. Test the pipeline with sample tickets
          2. Monitor CloudWatch Logs
          3. Run the destroy workflow when finished!
          EOF

  # Job 4: Security Scan
  security:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: true
