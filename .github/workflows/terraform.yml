name: 'OpenTofu CI/CD'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # Job 1: Validación y formateo
  validate:
    name: 'Validate and Format'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: tofu init -backend=false

      - name: Terraform Validate
        run: tofu validate

  # Job 2: Plan (en pull requests)
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Terraform Init
        run: tofu init

      - name: Terraform Plan
        id: plan
        run: tofu plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan</summary>
            
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # Job 3: Apply (solo en main, con aprobación manual)
  apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: 
      name: production
      url: https://console.aws.amazon.com/states/home
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Terraform Init
        run: tofu init

      - name: Terraform Apply
        run: tofu apply -auto-approve

      - name: Get Outputs
        id: outputs
        run: |
          echo "bucket_name=$(tofu output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "step_function_arn=$(tofu output -raw step_function_arn)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🚀 Deployment Successful!
          
          ### Resources Created:
          - **S3 Bucket**: \`${{ steps.outputs.outputs.bucket_name }}\`
          - **Step Function**: [\`${{ steps.outputs.outputs.step_function_arn }}\`](https://console.aws.amazon.com/states/home)
          
          ### Next Steps:
          1. Test the pipeline with sample tickets
          2. Monitor CloudWatch Logs
          3. Remember to run \`tofu destroy\` after testing!
          EOF

  # Job 4: Security Scan
  security:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: true
