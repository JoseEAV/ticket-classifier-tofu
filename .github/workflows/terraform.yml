name: 'OpenTofu CI/CD'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # Job 1: Validación y formateo (sin backend, sin credenciales AWS)
  validate:
    name: 'Validate and Format'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init (sin backend)
        run: tofu init -backend=false

      - name: Terraform Validate
        run: tofu validate

  # Job 2: Plan (en pull requests)
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Ensure Terraform State Bucket Exists
        run: |
          BUCKET="ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Terraform Init
        run: |
          tofu init \
            -backend-config="bucket=ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate" \
            -backend-config="key=ticket-classifier/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        id: plan
        run: tofu plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # Job 3: Apply (solo en main)
  apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://console.aws.amazon.com/states/home

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          student_id = "${{ secrets.STUDENT_ID }}"
          project_name = "ticket-classifier"
          aws_region = "${{ env.AWS_REGION }}"
          EOF

      - name: Ensure Terraform State Bucket Exists
        run: |
          BUCKET="ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Terraform Init
        run: |
          tofu init \
            -backend-config="bucket=ticket-classifier-${{ secrets.STUDENT_ID }}-tfstate" \
            -backend-config="key=ticket-classifier/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Import Existing Resources into State
        run: |
          NAME="ticket-classifier-${{ secrets.STUDENT_ID }}"
          BASIC_EXEC="arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

          echo "Importing any existing AWS resources into Terraform state..."

          # IAM: lambda role
          aws iam get-role --role-name "${NAME}-lambda-role" > /dev/null 2>&1 && \
            tofu import aws_iam_role.lambda_role "${NAME}-lambda-role" 2>/dev/null || true

          # IAM: step function role
          aws iam get-role --role-name "${NAME}-step-function-role" > /dev/null 2>&1 && \
            tofu import aws_iam_role.step_function_role "${NAME}-step-function-role" 2>/dev/null || true

          # IAM: managed policy for S3
          S3_POLICY_ARN=$(aws iam list-policies --scope Local \
            --query "Policies[?PolicyName=='${NAME}-s3-access'].Arn" --output text 2>/dev/null)
          if [ -n "$S3_POLICY_ARN" ] && [ "$S3_POLICY_ARN" != "None" ]; then
            tofu import aws_iam_policy.s3_access "${S3_POLICY_ARN}" 2>/dev/null || true
          fi

          # IAM: policy attachments on lambda role
          aws iam get-role --role-name "${NAME}-lambda-role" > /dev/null 2>&1 && {
            tofu import aws_iam_role_policy_attachment.lambda_logs \
              "${NAME}-lambda-role/${BASIC_EXEC}" 2>/dev/null || true
            if [ -n "$S3_POLICY_ARN" ] && [ "$S3_POLICY_ARN" != "None" ]; then
              tofu import aws_iam_role_policy_attachment.lambda_s3 \
                "${NAME}-lambda-role/${S3_POLICY_ARN}" 2>/dev/null || true
            fi
          } || true

          # IAM: inline policies on step function role
          aws iam get-role --role-name "${NAME}-step-function-role" > /dev/null 2>&1 && {
            aws iam get-role-policy --role-name "${NAME}-step-function-role" \
              --policy-name "${NAME}-lambda-invoke" > /dev/null 2>&1 && \
              tofu import aws_iam_role_policy.step_function_lambda_policy \
                "${NAME}-step-function-role:${NAME}-lambda-invoke" 2>/dev/null || true

            aws iam get-role-policy --role-name "${NAME}-step-function-role" \
              --policy-name "${NAME}-logs" > /dev/null 2>&1 && \
              tofu import aws_iam_role_policy.step_function_logs_policy \
                "${NAME}-step-function-role:${NAME}-logs" 2>/dev/null || true
          } || true

          # S3: bucket + sub-recursos
          aws s3api head-bucket --bucket "${NAME}-tickets" > /dev/null 2>&1 && {
            tofu import aws_s3_bucket.tickets_bucket "${NAME}-tickets" 2>/dev/null || true
            tofu import aws_s3_bucket_public_access_block.tickets_bucket \
              "${NAME}-tickets" 2>/dev/null || true
            tofu import aws_s3_bucket_versioning.tickets_bucket \
              "${NAME}-tickets" 2>/dev/null || true
          } || true

          # CloudWatch Log Group
          LOG_NAME="/aws/stepfunctions/${NAME}-ticket-classifier"
          aws logs describe-log-groups --log-group-name-prefix "${LOG_NAME}" \
            --query "logGroups[0].logGroupName" --output text 2>/dev/null | grep -q "${NAME}" && \
            tofu import aws_cloudwatch_log_group.step_function_logs "${LOG_NAME}" 2>/dev/null || true

          # Lambda functions (dentro de módulos)
          for fn in validate-ticket classify-ticket route-ticket; do
            aws lambda get-function --function-name "${NAME}-${fn}" > /dev/null 2>&1 && {
              MODULE=$(echo "$fn" | tr '-' '_')
              tofu import "module.${MODULE}.aws_lambda_function.this" \
                "${NAME}-${fn}" 2>/dev/null || true
            } || true
          done

          # Step Function state machine
          SFN_ARN=$(aws stepfunctions list-state-machines \
            --query "stateMachines[?name=='${NAME}-ticket-classifier'].stateMachineArn" \
            --output text 2>/dev/null)
          if [ -n "$SFN_ARN" ] && [ "$SFN_ARN" != "None" ]; then
            tofu import aws_sfn_state_machine.ticket_classifier "${SFN_ARN}" 2>/dev/null || true
          fi

          echo "Import complete."

      - name: Terraform Apply
        run: tofu apply -auto-approve

      - name: Get Outputs
        id: outputs
        run: |
          echo "bucket_name=$(tofu output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "step_function_arn=$(tofu output -raw step_function_arn)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Deployment Successful!

          ### Resources Created/Updated:
          - **S3 Bucket**: \`${{ steps.outputs.outputs.bucket_name }}\`
          - **Step Function**: \`${{ steps.outputs.outputs.step_function_arn }}\`

          ### Next Steps:
          1. Test the pipeline with sample tickets
          2. Monitor CloudWatch Logs
          3. Run the destroy workflow when finished!
          EOF

  # Job 4: Security Scan
  security:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: true
